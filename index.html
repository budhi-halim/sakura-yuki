<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sakura Yuki Prompt Studio</title>
    <link rel="stylesheet" href="style.css">
    <script type="module" src="script.js"></script>
  </head>
  <body>
    <main class="main-container">
      <header class="header-section">
        <h1 class="main-title">Sakura Yuki <span class="accent-text">Studio</span></h1>
        <p class="sub-title">High-Fidelity Prompt Architecture</p>
      </header>
      
      <section class="controls-section">
        <label class="select-label" for="composition-select">Select Scene Architecture</label>
        <select id="composition-select" class="theme-select">
          <button>
            <selectedcontent></selectedcontent>
          </button>
          <option value="" disabled selected>— Choose a Scene —</option>
          <!-- Options injected via JS -->
        </select>
      </section>
      
      <section class="outputs-section">
        <vfx-box class="prompt-card">
          <div class="card-header">
            <h2 class="card-title">Raw Prompt Base</h2>
            <button class="copy-btn" data-target="prompt-output" title="Copy Prompt">
              <svg class="icon-copy" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" d="M16.5 8.25V6a2.25 2.25 0 0 0-2.25-2.25H6A2.25 2.25 0 0 0 3.75 6v8.25A2.25 2.25 0 0 0 6 16.5h2.25m8.25-8.25H18a2.25 2.25 0 0 1 2.25 2.25V18A2.25 2.25 0 0 1 18 20.25h-7.5A2.25 2.25 0 0 1 8.25 18v-1.5m8.25-8.25h-6a2.25 2.25 0 0 0-2.25 2.25v6" />
              </svg>
              <svg class="icon-check hidden-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" d="m4.5 12.75 6 6 9-13.5" />
              </svg>
            </button>
          </div>
          <div class="prompt-box" id="prompt-output">Awaiting selection...</div>
        </vfx-box>
      </section>
    </main>
  </body>
</html>
